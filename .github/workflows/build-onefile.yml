name: Build OneFile Version (Emergency Fix)

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*-onefile'

jobs:
  build-onefile:
    name: Build OneFile on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Install Windows SDK (for VC++ Runtime)
      if: runner.os == 'Windows'
      run: |
        choco install vcredist-all -y

    - name: Build OneFile with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "Building single-file executable for better compatibility..."
        pyinstaller --clean --noconfirm --log-level=INFO main_onefile.spec

    - name: Verify Windows OneFile build
      if: runner.os == 'Windows'
      run: |
        if (!(Test-Path "dist/PDFQRCodeCompare.exe")) {
          Write-Error "OneFile build failed: executable not found"
          exit 1
        }
        Write-Host "OneFile build verification passed"
        $fileSize = (Get-Item "dist/PDFQRCodeCompare.exe").Length / 1MB
        Write-Host "Executable size: $([math]::Round($fileSize, 2)) MB"

    - name: Create Windows OneFile ZIP
      if: runner.os == 'Windows'
      run: |
        cd dist
        New-Item -ItemType Directory -Path "PDFQRCodeCompare-OneFile" -Force
        Copy-Item "PDFQRCodeCompare.exe" -Destination "PDFQRCodeCompare-OneFile/"

        # Create README
        @"
PDF QR Code Compare - Single File Edition

This is a SINGLE FILE executable for maximum compatibility.

INSTALLATION:
1. Install Visual C++ Redistributable first:
   https://aka.ms/vs/17/release/vc_redist.x64.exe

2. Extract PDFQRCodeCompare.exe to a folder with English path
   Good: C:\Tools\PDFQRCodeCompare\
   Bad:  C:\360安全浏览器下载\

3. Right-click PDFQRCodeCompare.exe → Run as Administrator

4. If Windows SmartScreen blocks it:
   - Click "More info"
   - Click "Run anyway"

TROUBLESHOOTING:
- First run may be slow (extracting temporary files)
- Requires 500MB temp space
- Windows Defender may flag it (safe to allow)

For detailed instructions:
https://github.com/Reginald-Du/pdf-qrcode-compare/blob/main/WINDOWS_INSTALLATION.md
"@ | Out-File -FilePath "PDFQRCodeCompare-OneFile/README.txt" -Encoding UTF8

        powershell Compress-Archive -Force -Path PDFQRCodeCompare-OneFile -DestinationPath PDFQRCodeCompare-Windows-OneFile.zip
        cd ..

    - name: Upload Windows OneFile artifacts
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: PDFQRCodeCompare-Windows-OneFile
        path: dist/PDFQRCodeCompare-Windows-OneFile.zip
        retention-days: 30

    - name: Release OneFile
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/PDFQRCodeCompare-Windows-OneFile.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
